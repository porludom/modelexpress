name: 'Run ModelExpress P2P CI Test'
description: |
  Self-contained action that owns the full lifecycle of a single test namespace:
    1. Create namespace
    2. Apply CRD (idempotent), RBAC, secrets, mx-server
    3. Deploy source worker, wait for ModelMetadata CR
    4. Deploy target worker, wait for pods to leave Pending
    5. Run pytest against the deployed resources
    6. Delete the namespace on exit (pass or fail)

  Isolation: each framework gets its own namespace, so multiple matrix jobs
  can run in parallel once max-parallel is removed from the workflow strategy.

inputs:
  kubeconfig_base64:
    description: 'Base64-encoded kubeconfig for the vCluster'
    required: true
  namespace:
    description: 'Namespace to create inside the vCluster for this test run'
    required: false
    default: 'mx-ci-default'
  server_image:
    description: 'Fully-qualified MX server image (built from ci/k8s/server/Dockerfile.server)'
    required: true
  manifest:
    description: 'Repo-root-relative path to the K8s manifest. Envsubst is run on it before apply.'
    required: true
  test_script:
    description: 'Repo-root-relative path to the pytest file to run after pods are up'
    required: true
  worker_image:
    description: 'Fully-qualified worker image (e.g. built from ci/k8s/client/vllm/Dockerfile)'
    required: true
  model:
    description: 'HuggingFace model id — exposed as MX_CI_MODEL for envsubst and pytest'
    required: false
    default: 'Qwen/Qwen2.5-0.5B'
  hf_token:
    description: 'HuggingFace token — written as hf-token-secret in the test namespace. Required: worker manifests reference the secret unconditionally.'
    required: true
  source_extra_env:
    description: |
      KEY=VALUE pairs for the source manifest apply (one per line).
      When set, enables P2P mode: source is applied first, the action waits for
      the ModelMetadata CR, then the target manifest is applied.
      Example: JOB_NAME=mx-source
    required: false
    default: ''
  extra_env:
    description: |
      Additional KEY=VALUE pairs for the target (or only) manifest apply, one per line.
      These are exported before envsubst runs on the manifest.
      Example:
        JOB_NAME=mx-target
        S3_BUCKET=my-model-bucket
    required: false
    default: ''
  mx_p2p_metadata:
    description: |
      Value for the ${MX_P2P_METADATA} substitution in manifests that
      template it (currently vllm/manifest-azure.yaml). "1" (default) serves
      the tensor manifest on-demand via a WorkerGrpcServer. "0" exercises the
      full tensor-manifest publish path, where the source embeds the full
      tensor manifest in the WorkerMetadata proto it publishes. Applied to
      both source and target manifest applies.
    required: false
    default: '1'
  source_port:
    description: 'Port the source worker listens on — exported as WORKER_PORT for the source manifest and passed to pytest as --source-port'
    required: false
    default: '8001'
  worker_port:
    description: 'Port the target worker listens on — exported as WORKER_PORT for the target manifest and passed to pytest as --worker-port'
    required: false
    default: '8002'
  pod_ready_timeout_seconds:
    description: 'Seconds to wait for test pods to leave Pending state'
    required: false
    default: '900'
  worker_registry:
    description: 'Registry hostname for the worker image (used to create worker-registry imagePullSecret)'
    required: false
    default: ''
  ngc_api_key:
    description: 'NGC API key — used to create the worker-registry imagePullSecret'
    required: false
    default: ''
  pytest_args:
    description: 'Extra arguments forwarded verbatim to pytest'
    required: false
    default: ''
  tp_size:
    description: |
      Tensor-parallel size of the target deployment. Forwarded to pytest as
      --tp-size; the test asserts exactly this many rank-distinct
      `[Worker N] ... RDMA transfer complete` lines appear in mx-target logs.
      Catches silent TP collapse and rank-pairing regressions.
    required: false
    default: '1'
  dp_size:
    description: |
      Data-parallel size of the target deployment. Forwarded to pytest as
      --dp-size. DP replicas are interchangeable copies at the same
      worker_rank, so the per-rank agent assertion accepts a distinct-agent
      count in [tp_size, tp_size * dp_size] instead of exactly tp_size.
      Defaults to 1 (pure TP / single copy).
    required: false
    default: '1'
  measure_vram:
    description: 'When true, sample source/target VRAM and enable the pytest VRAM parity assertions.'
    required: false
    default: 'false'
  expected_artifact_sources:
    description: 'Number of ready non-weight artifact ModelMetadata CRs expected before target starts.'
    required: false
    default: '0'
  expected_artifact_source_types:
    description: 'Comma-separated non-weight artifact sourceType values expected by pytest.'
    required: false
    default: ''
runs:
  using: "composite"
  steps:
    - name: Setup vCluster kubeconfig
      shell: bash
      env:
        KUBECONFIG_B64: ${{ inputs.kubeconfig_base64 }}
      run: |
        echo "${KUBECONFIG_B64}" | base64 -d > ${{ github.workspace }}/.kubeconfig-vcluster
        chmod 600 ${{ github.workspace }}/.kubeconfig-vcluster
        echo "KUBECONFIG=${{ github.workspace }}/.kubeconfig-vcluster" >> $GITHUB_ENV

    - name: Setup test namespace
      shell: bash
      env:
        NAMESPACE: ${{ inputs.namespace }}
      run: |
        echo "::group::Create namespace ${NAMESPACE} and install prerequisites"
        kubectl create namespace ${NAMESPACE} --dry-run=client -o yaml | kubectl apply -f -

        # CRD is cluster-scoped — idempotent, safe to re-apply on every run.
        kubectl apply -f ci/k8s/server/crd-modelmetadata.yaml

        # RBAC scoped to this namespace.
        NAMESPACE=${NAMESPACE} envsubst < ci/k8s/server/rbac-modelmetadata.yaml | \
          kubectl apply -n ${NAMESPACE} -f -
        echo "::endgroup::"

    - name: Create worker registry pull secret
      if: inputs.worker_registry != '' && inputs.ngc_api_key != ''
      shell: bash
      env:
        REGISTRY: ${{ inputs.worker_registry }}
        NGC_API_KEY: ${{ inputs.ngc_api_key }}
        NAMESPACE: ${{ inputs.namespace }}
      run: |
        echo "::group::Create worker-registry pull secret"
        # docker-server is hardcoded to nvcr.io so this single secret
        # authenticates ALL nvcr.io images — both the team's worker images
        # (nvcr.io/0980761089281446/...) and the public base images (nvcr.io/nvidia/...).
        # Replaces the previous two-secret setup (worker-registry + ngc-registry).
        kubectl create secret docker-registry worker-registry \
          --docker-server="nvcr.io" \
          --docker-username='$oauthtoken' \
          --docker-password="${NGC_API_KEY}" \
          -n ${NAMESPACE} \
          --dry-run=client -o yaml | kubectl apply -f -
        echo "::endgroup::"

    - name: Create HF token secret
      if: inputs.hf_token != ''
      shell: bash
      env:
        HF_TOKEN: ${{ inputs.hf_token }}
        NAMESPACE: ${{ inputs.namespace }}
      run: |
        echo "::group::Create hf-token-secret"
        kubectl create secret generic hf-token-secret \
          --from-literal=HF_TOKEN="${HF_TOKEN}" \
          -n ${NAMESPACE} \
          --dry-run=client -o yaml | kubectl apply -f -
        echo "::endgroup::"

    - name: Deploy MX server
      shell: bash
      env:
        MX_SERVER_IMAGE: ${{ inputs.server_image }}
        NAMESPACE: ${{ inputs.namespace }}
      run: |
        echo "::group::Deploy MX server in ${NAMESPACE}"
        envsubst < ci/k8s/server/mx-server.yaml | kubectl apply -n ${NAMESPACE} -f -
        kubectl rollout status deployment/mx-server -n ${NAMESPACE} --timeout=120s
        echo "::endgroup::"

    - name: Apply source manifest
      if: inputs.source_extra_env != ''
      shell: bash
      env:
        WORKER_IMAGE: ${{ inputs.worker_image }}
        MX_CI_MODEL: ${{ inputs.model }}
        NAMESPACE: ${{ inputs.namespace }}
        WORKER_PORT: ${{ inputs.source_port }}
        SOURCE_EXTRA_ENV: ${{ inputs.source_extra_env }}
        MANIFEST: ${{ inputs.manifest }}
        MX_P2P_METADATA: ${{ inputs.mx_p2p_metadata }}
      run: |
        echo "::group::Apply source manifest (WORKER_PORT=${WORKER_PORT})"
        while IFS= read -r line; do
          [ -n "$line" ] && export "$line"
        done <<< "${SOURCE_EXTRA_ENV}"
        # envsubst allowlist (single-quoted SHELL-FORMAT arg) so only the
        # build-time variables get substituted. Manifests that embed
        # pod-side shell vars in scripts (e.g. multi-node Ray bootstrap
        # using ${POD_NAME} / ${HOSTNAME}) need those to be evaluated
        # AT POD RUNTIME, not silently blanked at apply time.
        #
        # Every variable a manifest references at apply time must appear
        # here. Anything passed via source_extra_env / extra_env that the
        # manifest templates against (e.g. ${MODEL_EXPRESS_SOURCE} for the
        # trt-llm source/target split) goes on the list too — otherwise
        # the literal `${VAR}` survives into the pod env, which Python
        # sees as a non-empty truthy string and reads as "set."
        envsubst '${WORKER_IMAGE} ${MX_SERVER_IMAGE} ${MX_CI_MODEL} ${WORKER_PORT} ${NAMESPACE} ${JOB_NAME} ${MODEL_EXPRESS_SOURCE} ${MX_P2P_METADATA}' \
          < "${MANIFEST}" | kubectl apply -n ${NAMESPACE} -f -
        echo "::endgroup::"

    - name: Wait for source to publish metadata
      if: inputs.source_extra_env != ''
      shell: bash
      env:
        NAMESPACE: ${{ inputs.namespace }}
        SOURCE_PORT: ${{ inputs.source_port }}
        TIMEOUT: ${{ inputs.pod_ready_timeout_seconds }}
        TP_SIZE: ${{ inputs.tp_size }}
        MEASURE_VRAM: ${{ inputs.measure_vram }}
        EXPECTED_ARTIFACT_SOURCES: ${{ inputs.expected_artifact_sources }}
      run: |
        [[ "${TP_SIZE}" =~ ^[1-9][0-9]*$ ]] || { echo "ERROR: tp_size must be a positive integer, got '${TP_SIZE}'"; exit 1; }
        [[ "${TIMEOUT}" =~ ^[1-9][0-9]*$ ]] || { echo "ERROR: pod_ready_timeout_seconds must be a positive integer, got '${TIMEOUT}'"; exit 1; }
        [[ "${MEASURE_VRAM}" == "true" || "${MEASURE_VRAM}" == "false" ]] || { echo "ERROR: measure_vram must be 'true' or 'false', got '${MEASURE_VRAM}'"; exit 1; }
        [[ "${EXPECTED_ARTIFACT_SOURCES}" =~ ^[0-9]+$ ]] || { echo "ERROR: expected_artifact_sources must be a non-negative integer, got '${EXPECTED_ARTIFACT_SOURCES}'"; exit 1; }
        source .github/actions/run-mx-p2p-test/vram-sampling.sh
        count_ready_artifact_sources() {
          kubectl get modelmetadata -n "${NAMESPACE}" -o jsonpath='{range .items[*]}{.spec.sourceType}{" "}{.status.worker.status}{" "}{.status.worker.artifactSource.artifactId}{"\n"}{end}' 2>/dev/null \
            | awk '$1 != "weights" && $2 == "Ready" && $3 != "" { count++ } END { print count + 0 }'
        }
        count_weight_sources() {
          # Count weight sources. `sourceType` is a newer CR field; servers
          # predating it (e.g. the released image the mixed-version
          # full-manifest entry runs against) publish weight CRs with no
          # sourceType, so an empty value is treated as a weight source too.
          # Current servers always set sourceType on non-weight (artifact)
          # sources, so this never miscounts an artifact source as a weight one.
          kubectl get modelmetadata -n "${NAMESPACE}" -o jsonpath='{range .items[*]}{.spec.sourceType}{"\n"}{end}' 2>/dev/null \
            | awk '$1 == "weights" || $1 == "" { count++ } END { print count + 0 }'
        }
        wait_for_artifact_sources() {
          local expected="$1"
          local deadline=$((SECONDS + TIMEOUT))

          echo "Source is healthy; wait for ${expected} artifact ModelMetadata CR(s)."
          while [ $SECONDS -lt $deadline ]; do
            local count
            count=$(count_ready_artifact_sources)
            if [ "${count}" -ge "${expected}" ]; then
              echo "Source published ${count}/${expected} artifact ModelMetadata CR(s)."
              return 0
            fi
            local failed
            failed=$(kubectl get pods -n ${NAMESPACE} -l "job-name=mx-source" --no-headers 2>/dev/null \
              | awk '$3 ~ /Error|CrashLoopBackOff|OOMKilled|ImagePullBackOff|ErrImagePull/' || true)
            if [ -n "${failed}" ]; then
              echo "ERROR: source pod failed before publishing artifact metadata: ${failed}"
              return 1
            fi
            echo "Have ${count}/${expected} artifact ModelMetadata CRs, retrying in 5s..."
            sleep 5
          done

          local final
          final=$(count_ready_artifact_sources)
          if [ "${final}" -lt "${expected}" ]; then
            echo "ERROR: source published only ${final}/${expected} artifact ModelMetadata CRs within ${TIMEOUT}s"
            kubectl get modelmetadata -n ${NAMESPACE} -o wide 2>&1 || true
            return 1
          fi
        }
        echo "::group::Wait for source to publish ${TP_SIZE} weight ModelMetadata CR(s)"
        # Wait for one CR per source rank. Under TP=N each rank publishes
        # its own ModelMetadata CR (worker_rank=0..N-1), and the target's
        # rdma_strategy filters source candidates by matching worker_rank.
        # If we apply target before all ranks publish, target's later-
        # numbered ranks find no matching source and fall back to disk
        # load — which surfaces later as the rank-distinct-agent assertion
        # failing in test_per_rank_source_agents.
        deadline=$((SECONDS + TIMEOUT))
        SOURCE_POD=""
        SOURCE_PEAK_VRAM_MIB=0
        SOURCE_FINAL_VRAM_MIB=0
        SOURCE_VRAM_SAMPLES=0

        while [ $SECONDS -lt $deadline ]; do
          if [ "${MEASURE_VRAM}" = "true" ]; then
            # Peak often equals final in healthy runs, but it catches transient
            # duplicate/staging allocations that are freed before /health.
            sample_peak_vram "Source" "job-name=mx-source" "mx-source" \
              SOURCE_POD SOURCE_PEAK_VRAM_MIB SOURCE_VRAM_SAMPLES SOURCE_FINAL_VRAM_MIB
          fi
          CR_COUNT=$(count_weight_sources)
          if [ "${CR_COUNT}" -ge "${TP_SIZE}" ]; then
            echo "Source published ${CR_COUNT}/${TP_SIZE} weight ModelMetadata CRs."
            break
          fi
          FAILED=$(kubectl get pods -n ${NAMESPACE} -l "job-name=mx-source" --no-headers 2>/dev/null \
            | awk '$3 ~ /Error|CrashLoopBackOff|OOMKilled|ImagePullBackOff|ErrImagePull/' || true)
          if [ -n "${FAILED}" ]; then
            echo "ERROR: source pod failed before publishing metadata: ${FAILED}"
            exit 1
          fi
          echo "Have ${CR_COUNT}/${TP_SIZE} weight ModelMetadata CRs, retrying in 5s..."
          sleep 5
        done
        # The loop exits without error when the deadline fires. Without this
        # final check, the next step would apply the target manifest against
        # a namespace that has fewer CRs than required and the test would
        # fail downstream with a confusing "no source worker for rank N"
        # error instead of the actual root cause.
        FINAL=$(count_weight_sources)
        if [ "${FINAL}" -lt "${TP_SIZE}" ]; then
          echo "ERROR: source published only ${FINAL}/${TP_SIZE} weight ModelMetadata CRs within ${TIMEOUT}s"
          exit 1
        fi
        if [ "${MEASURE_VRAM}" = "true" ]; then
          echo "Source published metadata; continue sampling until source /health returns 200."
          wait_for_health "Source" "job-name=mx-source" "mx-source" \
            "${SOURCE_PORT}" SOURCE_POD "${TIMEOUT}" " after metadata publish" \
            SOURCE_PEAK_VRAM_MIB SOURCE_VRAM_SAMPLES SOURCE_FINAL_VRAM_MIB
          echo "SOURCE_PEAK_VRAM_MIB=${SOURCE_PEAK_VRAM_MIB}" >> "$GITHUB_ENV"
          echo "SOURCE_FINAL_VRAM_MIB=${SOURCE_FINAL_VRAM_MIB}" >> "$GITHUB_ENV"
          echo "Source peak VRAM: ${SOURCE_PEAK_VRAM_MIB} MiB across ${SOURCE_VRAM_SAMPLES} sample(s)."
          echo "Source final VRAM after /health: ${SOURCE_FINAL_VRAM_MIB} MiB."
        else
          echo "Source published metadata; wait until source /health returns 200."
          wait_for_health "Source" "job-name=mx-source" "mx-source" \
            "${SOURCE_PORT}" SOURCE_POD "${TIMEOUT}" " after metadata publish"
        fi
        if [ "${EXPECTED_ARTIFACT_SOURCES}" -gt 0 ]; then
          wait_for_artifact_sources "${EXPECTED_ARTIFACT_SOURCES}"
        fi
        echo "::endgroup::"

    - name: Apply target manifest
      shell: bash
      env:
        WORKER_IMAGE: ${{ inputs.worker_image }}
        MX_CI_MODEL: ${{ inputs.model }}
        NAMESPACE: ${{ inputs.namespace }}
        WORKER_PORT: ${{ inputs.worker_port }}
        EXTRA_ENV: ${{ inputs.extra_env }}
        MANIFEST: ${{ inputs.manifest }}
        MX_P2P_METADATA: ${{ inputs.mx_p2p_metadata }}
      run: |
        echo "::group::Apply ${MANIFEST} (WORKER_PORT=${WORKER_PORT})"
        while IFS= read -r line; do
          [ -n "$line" ] && export "$line"
        done <<< "${EXTRA_ENV}"
        # See same-named source-apply step above for the allowlist rationale;
        # ${MX_P2P_METADATA} defaults to "1" via the mx_p2p_metadata input.
        envsubst '${WORKER_IMAGE} ${MX_SERVER_IMAGE} ${MX_CI_MODEL} ${WORKER_PORT} ${NAMESPACE} ${JOB_NAME} ${MODEL_EXPRESS_SOURCE} ${MX_P2P_METADATA}' \
          < "${MANIFEST}" | kubectl apply -n ${NAMESPACE} -f -
        echo "::endgroup::"

    - name: Wait for target /health to return 200
      shell: bash
      env:
        NAMESPACE: ${{ inputs.namespace }}
        WORKER_PORT: ${{ inputs.worker_port }}
        TIMEOUT: ${{ inputs.pod_ready_timeout_seconds }}
        MEASURE_VRAM: ${{ inputs.measure_vram }}
      run: |
        [[ "${TIMEOUT}" =~ ^[1-9][0-9]*$ ]] || { echo "ERROR: pod_ready_timeout_seconds must be a positive integer, got '${TIMEOUT}'"; exit 1; }
        [[ "${MEASURE_VRAM}" == "true" || "${MEASURE_VRAM}" == "false" ]] || { echo "ERROR: measure_vram must be 'true' or 'false', got '${MEASURE_VRAM}'"; exit 1; }
        source .github/actions/run-mx-p2p-test/vram-sampling.sh
        echo "::group::Waiting for target /health to return 200"
        # Only wait on the target — source was already gated by the
        # `Wait for source to publish metadata` step (publishing requires
        # the worker to be fully Running with the MX plugin loaded), and
        # mx-server has its own rollout-status wait at deploy time.
        #
        # Why probe /health rather than rely on K8s Ready state:
        #   The test manifests don't define a readinessProbe, so K8s marks
        #   the pod Ready as soon as the container is Running — that
        #   happens within seconds of image pull, way before vLLM has even
        #   loaded the model. Without an HTTP probe at the application
        #   level we'd fall through to pytest while vLLM is still
        #   initializing, and pytest would race the actual serving
        #   readiness (kubectl logs returning ~10s of startup output,
        #   /v1/completions returning 503, etc).
        #
        # Could be solved by adding a readinessProbe to every manifest
        # (vllm-azure, sgl-azure, trt-llm-azure, ...) but doing it once
        # here in the action keeps each manifest framework-agnostic and
        # avoids drift between manifests.
        #
        # Probing via `kubectl exec ... curl localhost:${PORT}/health`
        # rather than port-forward: avoids the port-leak failure mode
        # we hit with vCluster and works on any framework whose container
        # ships curl (vllm/vllm-openai + sglang base images both do).
        TARGET_POD=""
        TARGET_PEAK_VRAM_MIB=0
        TARGET_FINAL_VRAM_MIB=0
        TARGET_VRAM_SAMPLES=0
        if [ "${MEASURE_VRAM}" = "true" ]; then
          wait_for_health "Target" "job-name=mx-target" "mx-target" \
            "${WORKER_PORT}" TARGET_POD "${TIMEOUT}" "" \
            TARGET_PEAK_VRAM_MIB TARGET_VRAM_SAMPLES TARGET_FINAL_VRAM_MIB
          VRAM_MEASUREMENTS_PATH="${GITHUB_WORKSPACE}/.mx-vram-measurements.json"
          write_vram_measurements "${VRAM_MEASUREMENTS_PATH}" \
            "${SOURCE_PEAK_VRAM_MIB}" "${SOURCE_FINAL_VRAM_MIB}" \
            "${TARGET_PEAK_VRAM_MIB}" "${TARGET_FINAL_VRAM_MIB}" \
            "0.5"
          echo "MX_VRAM_MEASUREMENTS_PATH=${VRAM_MEASUREMENTS_PATH}" >> "$GITHUB_ENV"
          echo "VRAM measurements written to ${VRAM_MEASUREMENTS_PATH}:"
          cat "${VRAM_MEASUREMENTS_PATH}"
          echo "Target peak VRAM: ${TARGET_PEAK_VRAM_MIB} MiB across ${TARGET_VRAM_SAMPLES} sample(s)."
          echo "Target final VRAM after /health: ${TARGET_FINAL_VRAM_MIB} MiB."
        else
          wait_for_health "Target" "job-name=mx-target" "mx-target" \
            "${WORKER_PORT}" TARGET_POD "${TIMEOUT}"
        fi
        echo "::endgroup::"

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.12"

    - name: Install test dependencies
      shell: bash
      run: pip install pytest

    - name: Run tests
      shell: bash
      env:
        NAMESPACE: ${{ inputs.namespace }}
        MX_CI_MODEL: ${{ inputs.model }}
        SOURCE_PORT: ${{ inputs.source_port }}
        WORKER_PORT: ${{ inputs.worker_port }}
        TEST_SCRIPT: ${{ inputs.test_script }}
        TP_SIZE: ${{ inputs.tp_size }}
        DP_SIZE: ${{ inputs.dp_size }}
        PYTEST_ARGS: ${{ inputs.pytest_args }}
        EXPECTED_ARTIFACT_SOURCES: ${{ inputs.expected_artifact_sources }}
        EXPECTED_ARTIFACT_SOURCE_TYPES: ${{ inputs.expected_artifact_source_types }}
      run: |
        # Parse PYTEST_ARGS via shlex so values with internal spaces
        # (e.g. --p2p-marker 'TRT-LLM marker with spaces') are honored,
        # without eval'ing the string (which would execute $(...) etc).
        declare -a EXTRA=()
        if [ -n "${PYTEST_ARGS}" ]; then
          mapfile -d '' -t EXTRA < <(
            python3 -c 'import shlex,sys; [sys.stdout.buffer.write(a.encode()+b"\0") for a in shlex.split(sys.argv[1])]' "${PYTEST_ARGS}"
          )
        fi
        if [ "${EXPECTED_ARTIFACT_SOURCES}" != "0" ] || [ -n "${EXPECTED_ARTIFACT_SOURCE_TYPES}" ]; then
          EXTRA+=(--require-artifact-transfer)
        fi
        if [ "${EXPECTED_ARTIFACT_SOURCES}" != "0" ]; then
          EXTRA+=(--expected-artifact-sources "${EXPECTED_ARTIFACT_SOURCES}")
        fi
        if [ -n "${EXPECTED_ARTIFACT_SOURCE_TYPES}" ]; then
          EXTRA+=(--expected-artifact-source-types "${EXPECTED_ARTIFACT_SOURCE_TYPES}")
        fi
        pytest "${TEST_SCRIPT}" -v \
          --namespace "${NAMESPACE}" \
          --model "${MX_CI_MODEL}" \
          --source-port "${SOURCE_PORT}" \
          --worker-port "${WORKER_PORT}" \
          --tp-size "${TP_SIZE}" \
          --dp-size "${DP_SIZE}" \
          "${EXTRA[@]}"

    - name: Dump pod logs
      # Runs on both success and failure. On failure it's the primary
      # triage signal; on success it's still useful for timing analysis
      # and confirming the RDMA / agent-pair behavior matches expectations.
      if: always()
      shell: bash
      env:
        NAMESPACE: ${{ inputs.namespace }}
      run: |
        set +eo pipefail
        echo "::group::Pod summary"
        kubectl get pods -n ${NAMESPACE} -o wide 2>&1 || true
        echo "::endgroup::"

        # Namespace events surface scheduler decisions, image-pull errors,
        # OOM kills, and probe failures — the highest-signal one-shot view
        # for almost any deployment-time failure.
        echo "::group::Namespace events (last 50, newest first)"
        kubectl get events -n ${NAMESPACE} --sort-by='.lastTimestamp' 2>&1 | tail -50 || true
        echo "::endgroup::"

        # Dump logs from EVERY pod in the namespace, including mx-server.
        # Earlier version excluded mx-server to reduce noise when only test
        # pods were suspect, but that masked mx-server's own startup failures.
        for POD in $(kubectl get pods -n ${NAMESPACE} --no-headers 2>/dev/null \
            | awk '{print $1}'); do
          echo "::group::describe ${POD}"
          kubectl describe pod -n ${NAMESPACE} "${POD}" 2>&1 | tail -60 || true
          echo "::endgroup::"
          echo "::group::logs ${POD} (all containers)"
          kubectl logs -n ${NAMESPACE} "${POD}" --all-containers --tail=150 2>&1 || true
          echo "::endgroup::"
        done

    - name: Cleanup test namespace
      if: always()
      shell: bash
      env:
        NAMESPACE: ${{ inputs.namespace }}
      run: |
        echo "::group::Delete namespace ${NAMESPACE}"
        # No `|| true` here on purpose: with per-run-id namespace names, an
        # orphaned namespace from a failed cleanup would leak silently and
        # accumulate over time (one new namespace per run, none ever GC'd).
        # Surface the failure immediately so it can be investigated.
        #
        # Timeout sized for our slowest realistic case:
        #   - 3 pods (mx-server, mx-source, mx-target) each with a 30s
        #     graceful-shutdown grace period under K8s default settings
        #   - ModelMetadata + ModelCacheEntry CR finalizers (driven by the
        #     mx-server controller) — usually <30s but can stretch
        #   - K8s namespace finalizer clearance after all child resources
        # 3 min is enough buffer for the legitimate slow path; in practice the
        # safeguard (force-finalize via kubectl replace --raw) is what
        # consistently completes the delete because stuck finalizers from
        # CR controllers / dynamo operator are the common case, not the
        # exception. The ::warning:: still fires so unhealthy cleanup
        # conditions are visible in the GHA UI.
        if ! kubectl delete namespace "${NAMESPACE}" --ignore-not-found --timeout=180s; then
          echo "::warning::Namespace ${NAMESPACE} did not finalize within 180s; force-clearing finalizers as a safeguard. Investigate the underlying stuck resource."
          kubectl get ns "${NAMESPACE}" -o json 2>/dev/null \
            | jq '.spec.finalizers = []' \
            | kubectl replace --raw "/api/v1/namespaces/${NAMESPACE}/finalize" -f - || true
          # Verify the namespace actually finalized. If it didn't, that means
          # the API rejected our force-clear too — there's something deeper
          # broken (e.g., dead admission webhook, unreachable conversion
          # service). Fail loud so it gets investigated. If the namespace IS
          # gone, the safeguard did its job — exit 0 and rely on the
          # ::warning:: above for visibility.
          sleep 5
          if kubectl get ns "${NAMESPACE}" --no-headers 2>/dev/null | grep -q .; then
            echo "::error::Namespace ${NAMESPACE} still present after force-finalize. Force-clear was rejected; deeper cluster issue."
            kubectl get ns "${NAMESPACE}" -o yaml 2>&1 | tail -40
            exit 1
          fi
          echo "Namespace ${NAMESPACE} is gone (safeguard cleared finalizers successfully)."
        fi
        echo "::endgroup::"
