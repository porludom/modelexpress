name: 'Run ModelExpress Model Streamer Test'
description: |
  Standalone model-streamer CI test. Runs a single inference server via Docker on a
  GPU runner — no vCluster, no mx-server, no P2P. Exercises the
  runai-model-streamer path by streaming safetensors directly from S3, or
  verifies fallback to HuggingFace when S3 streaming fails.

  Pre-run setup (one-time): downloads the model safetensors from HuggingFace
  and uploads to S3 if not already present. Subsequent runs skip the upload.
  No cleanup — the S3 bucket acts as a persistent cache across runs.

  Credentials: the runner is expected to have IRSA (IAM Roles for Service
  Accounts) access to the S3 bucket via its EKS pod service account.
  AWS_ROLE_ARN and AWS_WEB_IDENTITY_TOKEN_FILE are forwarded from the pod
  into the Docker container so boto3 can assume the role.

inputs:
  framework:
    description: 'Inference framework to launch (vllm or sglang)'
    required: true
  worker_image:
    description: 'Fully-qualified worker image for the selected framework'
    required: true
  model:
    description: 'HuggingFace model id — used for architecture config and as the upload/download target'
    required: false
    default: 'Qwen/Qwen2.5-0.5B'
  s3_bucket:
    description: 'S3 bucket name for the model weight cache'
    required: true
  s3_region:
    description: 'AWS region for the S3 bucket'
    required: false
    default: 'us-east-1'
  port:
    description: 'Port the inference server listens on inside the container'
    required: false
    default: '18888'
  streamer_concurrency:
    description: 'RUNAI_STREAMER_CONCURRENCY — number of parallel S3 read threads'
    required: false
    default: '16'
  load_timeout_seconds:
    description: 'Seconds to wait for "Model streamer weight loading complete" in container logs'
    required: false
    default: '300'
  hf_token:
    description: 'HuggingFace token — only required for gated models. Ignored when empty (public models work without it).'
    required: false
    default: ''
  test_model_streamer_fallback:
    description: 'Test Model Streamer fallback to the default loader when S3 streaming fails'
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.12"

    - name: Populate S3 model cache (upload safetensors if missing)
      if: inputs.test_model_streamer_fallback == 'false'
      shell: bash
      env:
        MODEL: ${{ inputs.model }}
        S3_BUCKET: ${{ inputs.s3_bucket }}
        S3_REGION: ${{ inputs.s3_region }}
        # huggingface_hub reads HF_TOKEN automatically when present. Empty value
        # is harmless — anonymous download still works for public models.
        HF_TOKEN: ${{ inputs.hf_token }}
      run: |
        # Python is provided by the setup-python step above; works on
        # self-hosted runners without assuming the runner image ships Python.
        # boto3 is ~3 MB and installs in seconds; avoids assuming aws-cli
        # or any other tool is present in the runner image.
        pip install -q boto3 huggingface_hub

        python3 - <<'EOF'
        import boto3, os, pathlib, tempfile
        from huggingface_hub import snapshot_download

        bucket = os.environ["S3_BUCKET"]
        region = os.environ["S3_REGION"]
        model  = os.environ["MODEL"]
        prefix = f"models/{model}/"

        s3 = boto3.client("s3", region_name=region)

        # Check if safetensors are already in S3.
        resp = s3.list_objects_v2(Bucket=bucket, Prefix=prefix, MaxKeys=1)
        if any(obj["Key"].endswith(".safetensors") for obj in resp.get("Contents", [])):
            print(f"Safetensors already in s3://{bucket}/{prefix} — skipping upload.")
        else:
            print(f"Downloading safetensors for {model} from HuggingFace...")
            with tempfile.TemporaryDirectory() as tmpdir:
                snapshot_download(
                    repo_id=model,
                    local_dir=tmpdir,
                    allow_patterns=["*.safetensors", "*.safetensors.index.json"],
                )
                exts = (".safetensors", ".safetensors.index.json")
                files = [f for f in pathlib.Path(tmpdir).rglob("*")
                         if f.is_file() and any(f.name.endswith(e) for e in exts)]
                print(f"Uploading {len(files)} file(s) to s3://{bucket}/{prefix}")

                uploaded = []
                try:
                    for f in files:
                        key = prefix + f.relative_to(tmpdir).as_posix()
                        print(f"  {f.name} -> {key}")
                        s3.upload_file(str(f), bucket, key)
                        uploaded.append((key, f.stat().st_size))
                except Exception as e:
                    print(f"ERROR: upload failed mid-stream: {e}")
                    print(f"Rolling back {len(uploaded)} partially-uploaded file(s) "
                          f"to avoid poisoning the S3 cache for future runs...")
                    for key, _ in uploaded:
                        try:
                            s3.delete_object(Bucket=bucket, Key=key)
                            print(f"  rolled back: {key}")
                        except Exception as rb:
                            print(f"  WARN: failed to roll back {key}: {rb}")
                    raise

                # Verify each uploaded object is actually in S3 with matching size.
                # Catches silent corruption (rare) and confirms the cache is usable.
                for key, expected_size in uploaded:
                    head = s3.head_object(Bucket=bucket, Key=key)
                    actual_size = head["ContentLength"]
                    if actual_size != expected_size:
                        raise RuntimeError(
                            f"Size mismatch for s3://{bucket}/{key}: "
                            f"expected {expected_size}, got {actual_size}"
                        )
                print(f"Upload verified: {len(uploaded)} file(s).")
        EOF

    - name: Prepare model streamer launch
      shell: bash
      env:
        FRAMEWORK: ${{ inputs.framework }}
        MODEL: ${{ inputs.model }}
        S3_BUCKET: ${{ inputs.s3_bucket }}
        PORT: ${{ inputs.port }}
        STREAMER_CONCURRENCY: ${{ inputs.streamer_concurrency }}
        TEST_MODEL_STREAMER_FALLBACK: ${{ inputs.test_model_streamer_fallback }}
      run: |
        set -euo pipefail
        [[ "${PORT}" =~ ^[1-9][0-9]*$ ]] || { echo "ERROR: port must be a positive integer, got '${PORT}'"; exit 1; }
        [[ "${STREAMER_CONCURRENCY}" =~ ^[1-9][0-9]*$ ]] || { echo "ERROR: streamer_concurrency must be a positive integer, got '${STREAMER_CONCURRENCY}'"; exit 1; }
        [[ "${FRAMEWORK}" = "vllm" || "${FRAMEWORK}" = "sglang" ]] || { echo "ERROR: unsupported framework '${FRAMEWORK}'"; exit 1; }
        MODEL_S3_URI="s3://${S3_BUCKET}/models/${MODEL}"
        if [ "${TEST_MODEL_STREAMER_FALLBACK}" = "true" ]; then
          MODEL_S3_URI="s3://${S3_BUCKET}/mx-ci-s3-fallback/missing/${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}/${MODEL}"
        fi

        # IRSA credentials don't auto-propagate into child containers. The EKS
        # runner pod gets AWS_ROLE_ARN + AWS_WEB_IDENTITY_TOKEN_FILE wired in,
        # but a `docker run` child sees neither unless we forward them: pass
        # the role ARN as -e and mount the OIDC token file in as a volume.
        # boto3 inside the container then does its own sts:AssumeRoleWithWebIdentity.
        IRSA_TOKEN="${AWS_WEB_IDENTITY_TOKEN_FILE:-/var/run/secrets/eks.amazonaws.com/serviceaccount/token}"
        echo "MODEL_S3_URI=${MODEL_S3_URI}" >> "$GITHUB_ENV"
        echo "IRSA_TOKEN=${IRSA_TOKEN}" >> "$GITHUB_ENV"

    - name: Start vLLM container with model streamer
      if: inputs.framework == 'vllm'
      shell: bash
      env:
        WORKER_IMAGE: ${{ inputs.worker_image }}
        MODEL: ${{ inputs.model }}
        S3_REGION: ${{ inputs.s3_region }}
        PORT: ${{ inputs.port }}
        STREAMER_CONCURRENCY: ${{ inputs.streamer_concurrency }}
        TEST_MODEL_STREAMER_FALLBACK: ${{ inputs.test_model_streamer_fallback }}
      run: |
        set -euo pipefail
        MODEL_ARG="${MODEL_S3_URI}"
        if [ "${TEST_MODEL_STREAMER_FALLBACK}" = "true" ]; then
          MODEL_ARG="${MODEL}"
        fi
        CONTAINER_ID=$(docker run -d --gpus all --ipc=host \
          --entrypoint python3 \
          -e AWS_ROLE_ARN="${AWS_ROLE_ARN}" \
          -e AWS_WEB_IDENTITY_TOKEN_FILE="/var/run/secrets/eks-token" \
          -v "${IRSA_TOKEN}:/var/run/secrets/eks-token:ro" \
          -e AWS_DEFAULT_REGION="${S3_REGION}" \
          -e MX_MODEL_URI="${MODEL_S3_URI}" \
          -e RUNAI_STREAMER_CONCURRENCY="${STREAMER_CONCURRENCY}" \
          -e VLLM_PLUGINS=modelexpress \
          -p "${PORT}:${PORT}" \
          "${WORKER_IMAGE}" \
          -m vllm.entrypoints.openai.api_server \
            --model "${MODEL_ARG}" \
            --served-model-name "${MODEL}" \
            --hf-config-path "${MODEL}" \
            --tokenizer "${MODEL}" \
            --load-format modelexpress \
            --port "${PORT}")
        echo "Container: ${CONTAINER_ID}"
        echo "CONTAINER_ID=${CONTAINER_ID}" >> "$GITHUB_ENV"

    - name: Start SGLang container with model streamer
      if: inputs.framework == 'sglang'
      shell: bash
      env:
        WORKER_IMAGE: ${{ inputs.worker_image }}
        MODEL: ${{ inputs.model }}
        S3_REGION: ${{ inputs.s3_region }}
        PORT: ${{ inputs.port }}
        STREAMER_CONCURRENCY: ${{ inputs.streamer_concurrency }}
      run: |
        set -euo pipefail
        # Keep SGLang's model path on the Hugging Face id. Passing the S3 URI
        # here selects SGLang's native runai_streamer loader and bypasses MX.
        CONTAINER_ID=$(docker run -d --gpus all --ipc=host \
          --entrypoint python3 \
          -e AWS_ROLE_ARN="${AWS_ROLE_ARN}" \
          -e AWS_WEB_IDENTITY_TOKEN_FILE="/var/run/secrets/eks-token" \
          -v "${IRSA_TOKEN}:/var/run/secrets/eks-token:ro" \
          -e AWS_DEFAULT_REGION="${S3_REGION}" \
          -e MX_MODEL_URI="${MODEL_S3_URI}" \
          -e RUNAI_STREAMER_CONCURRENCY="${STREAMER_CONCURRENCY}" \
          -p "${PORT}:${PORT}" \
          "${WORKER_IMAGE}" \
          -m sglang.launch_server \
            --model-path "${MODEL}" \
            --served-model-name "${MODEL}" \
            --load-format remote_instance \
            --remote-instance-weight-loader-backend modelexpress \
            --modelexpress-config '{"transport":"nixl"}' \
            --dtype bfloat16 \
            --disable-cuda-graph \
            --disable-piecewise-cuda-graph \
            --host 0.0.0.0 \
            --port "${PORT}")
        echo "Container: ${CONTAINER_ID}"
        echo "CONTAINER_ID=${CONTAINER_ID}" >> "$GITHUB_ENV"

    - name: Wait for model load to complete
      shell: bash
      env:
        LOAD_TIMEOUT: ${{ inputs.load_timeout_seconds }}
        TEST_MODEL_STREAMER_FALLBACK: ${{ inputs.test_model_streamer_fallback }}
      run: |
        set -euo pipefail
        [[ "${LOAD_TIMEOUT}" =~ ^[1-9][0-9]*$ ]] || { echo "ERROR: load_timeout_seconds must be a positive integer, got '${LOAD_TIMEOUT}'"; exit 1; }
        deadline=$((SECONDS + LOAD_TIMEOUT))
        while [ $SECONDS -lt $deadline ]; do
          LOGS="$(docker logs "${CONTAINER_ID}" 2>&1)"
          if [ "${TEST_MODEL_STREAMER_FALLBACK}" = "true" ]; then
            if echo "${LOGS}" | grep -q "Strategy model_streamer failed" \
              && echo "${LOGS}" | grep -q "Weights loaded from disk"; then
              echo "Model streamer fallback to default loader confirmed."
              exit 0
            fi
          elif echo "${LOGS}" | grep -q "Model streamer weight loading complete"; then
            echo "Model streamer loading confirmed."
            exit 0
          fi
          if [ "$(docker inspect "${CONTAINER_ID}" --format '{{.State.Running}}')" != "true" ]; then
            echo "ERROR: container exited before model loading completed."
            docker logs "${CONTAINER_ID}" 2>&1 | tail -80
            exit 1
          fi
          echo "Still loading... (${SECONDS}s elapsed)"
          sleep 10
        done

        echo "ERROR: model loading did not complete within ${LOAD_TIMEOUT}s."
        docker logs "${CONTAINER_ID}" 2>&1 | tail -80
        exit 1

    - name: Wait for OpenAI server to be ready
      shell: bash
      env:
        PORT: ${{ inputs.port }}
      run: |
        set -euo pipefail
        [[ "${PORT}" =~ ^[1-9][0-9]*$ ]] || { echo "ERROR: port must be a positive integer, got '${PORT}'"; exit 1; }
        timeout 60 bash -c \
          "until curl -sf http://localhost:${PORT}/health > /dev/null; do sleep 2; done"
        echo "Server ready on port ${PORT}."

    - name: Verify inference
      shell: bash
      env:
        MODEL: ${{ inputs.model }}
        PORT: ${{ inputs.port }}
      run: |
        set -euo pipefail
        RESPONSE=$(curl -sS --max-time 60 "http://localhost:${PORT}/v1/completions" \
          -H "Content-Type: application/json" \
          -d "{\"model\": \"${MODEL}\", \"prompt\": \"The capital of France is\", \"max_tokens\": 8}")
        echo "Response: ${RESPONSE}"
        echo "${RESPONSE}" | python3 -c "
        import json, sys
        body = json.load(sys.stdin)
        choices = body.get('choices', [])
        assert choices and choices[0].get('text'), f'No completion text in response: {body}'
        print('Inference OK:', repr(choices[0]['text'][:60]))
        "

    - name: Cleanup container
      if: always()
      shell: bash
      run: |
        if [ -n "${CONTAINER_ID:-}" ]; then
          echo "::group::Container logs (tail 200)"
          docker logs "${CONTAINER_ID}" 2>&1 | tail -200 || true
          echo "::endgroup::"
          docker stop "${CONTAINER_ID}" 2>/dev/null || true
          docker rm -f "${CONTAINER_ID}" 2>/dev/null || true
        fi

    - name: Cleanup local image
      # `if: always()` so this also runs when the job is cancelled by
      # cancel-in-progress concurrency. Without it, the vLLM worker image
      # (~15GB with deps + ModelExpress layer) accumulates in the GPU
      # runner's Docker daemon across runs and eventually exhausts disk.
      if: always()
      shell: bash
      env:
        WORKER_IMAGE: ${{ inputs.worker_image }}
      run: |
        docker image rm -f "${WORKER_IMAGE}" 2>/dev/null || true
