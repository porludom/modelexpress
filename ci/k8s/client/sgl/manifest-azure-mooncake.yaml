# Azure A100 single-job template for SGLang P2P weight-transfer CI tests over
# the Mooncake TransferEngine transport (transport=transfer_engine).
#
# SGLang's ModelExpress package loader runs the SAME command on both source and
# target pods. The first replica finds no READY source on the mx-server, loads
# weights natively, registers TransferEngine memory, and publishes its session.
# The second replica discovers that source and pulls with batch_transfer_sync_read.
#
# Applied twice by the workflow with different envsubst values:
#   Source apply:  JOB_NAME=mx-source  WORKER_PORT=<source_port>
#   Target apply:  JOB_NAME=mx-target  WORKER_PORT=<worker_port>
#
# Environment variables substituted by envsubst before each apply:
#   JOB_NAME      - mx-source or mx-target
#   WORKER_IMAGE  - image built from ci/k8s/client/sgl/Dockerfile.mooncake
#   WORKER_PORT   - port the SGLang server listens on
#   MX_CI_MODEL   - HuggingFace model id

---
apiVersion: batch/v1
kind: Job
metadata:
  name: ${JOB_NAME}
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: mx-p2p-worker
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: worker-registry
      # Pin to a specific GPU node pool rather than leaving the agentpool
      # open. Other pools in the cluster may have too few active nodes for
      # source + target anti-affinity to find a peer host, leaving target
      # Pending forever. The agentpool podAffinity below becomes redundant
      # (both pods already constrained here) but is kept for self-
      # documentation + as defense if this nodeSelector is removed.
      nodeSelector:
        agentpool: a100a
      affinity:
        # Source and target on different hosts so we exercise true cross-host
        # RDMA over IB, not intra-node loopback through the same NIC.
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: mx-p2p-worker
              topologyKey: kubernetes.io/hostname
        # Pin source + target to the SAME node pool. The test cluster splits
        # GPU nodes across multiple InfiniBand partitions (different pools
        # have different pkeys), and pods on different pkeys can't talk
        # RDMA to each other. Combined with the hostname anti-affinity above,
        # this forces source/target onto different hosts WITHIN the same
        # IB partition.
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: mx-p2p-worker
              topologyKey: agentpool
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: no-datadog
          operator: Exists
          effect: NoExecute
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 64Gi
      containers:
        - name: ${JOB_NAME}
          image: ${WORKER_IMAGE}
          # Force re-pull on every pod creation so CI/dev iterations on the same
          # tag pick up freshly pushed images instead of the node's cached copy.
          imagePullPolicy: Always
          command: ["python3", "-m", "sglang.launch_server"]
          args:
            - --model-path
            - "${MX_CI_MODEL}"
            - --host
            - "0.0.0.0"
            - --port
            - "${WORKER_PORT}"
            - --tp
            - "1"
            - --load-format
            - remote_instance
            - --remote-instance-weight-loader-backend
            - modelexpress
            - --modelexpress-config
            - '{"transport": "transfer_engine"}'
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MX_SERVER_ADDRESS
              value: "mx-server:8000"
            - name: MX_RDMA_NIC_PIN
              value: "auto"
            - name: UCX_RNDV_SCHEME
              value: "get_zcopy"
            - name: UCX_RNDV_THRESH
              value: "0"
            # MOONCAKE_DEVICE is intentionally NOT pinned. The example manifest
            # (examples/.../sglang-test-transfer-engine.yaml) hardcodes
            # mlx5_0..mlx5_11, but those are the NIC names on an 8-GPU H100
            # node; the a100a single-GPU node pool exposes a different set.
            # Following the NIXL variant's MX_RDMA_NIC_PIN=auto philosophy, we
            # let Mooncake auto-discover. If the first CI run fails on device
            # discovery, pin MOONCAKE_DEVICE to the a100a node's actual IB NIC.
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: HF_TOKEN
          ports:
            - containerPort: ${WORKER_PORT}
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
              rdma/ib: "1"
            limits:
              nvidia.com/gpu: "1"
              rdma/ib: "1"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
          securityContext:
            capabilities:
              add: [IPC_LOCK]
