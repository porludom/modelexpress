# Azure single-job template for P2P RDMA weight-transfer CI tests with
# expert parallelism (vLLM, --enable-expert-parallel over a TP=2 world).
#
# REQUIRES AN MoE MODEL. --enable-expert-parallel only does anything for
# mixture-of-experts models; the test-ep job pairs this manifest with
# deepseek-ai/DeepSeek-V2-Lite (MLA + MoE). Do not reuse it with the default
# dense CI model.
#
# EP vs TP — what this exercises beyond the TP=2 test:
#   In vLLM, EP layers on top of the TP world: attention stays TP-sharded
#   while the MoE experts are distributed expert-parallel across the same
#   ranks. So each rank still owns DISTINCT weights (its attention slice +
#   its expert subset), the source publishes one ModelMetadata CR per rank,
#   and the target pairs rank-for-rank exactly like TP. Hence the test-ep job
#   runs with tp_size=2 and the per-rank agent assertion expects two distinct
#   source agents (ranks 0 and 1).
#
#   The novel coverage is the identity hash: enabling EP sets
#   parallel_config.expert_parallel_size > 0, which build_source_identity
#   folds into mx_source_id. This is the first test to exercise rank pairing
#   with expert_parallel_size > 0 (TEST_PLAN row 5.3). If that field were
#   encoded inconsistently between source and target, the source_id would not
#   match, the target would fall back to disk, and the RDMA marker assertion
#   would fail.
#
# Differences vs manifest-azure-tp2.yaml:
#   - adds --enable-expert-parallel (the only arg change)
#   - everything else (TP=2, 2 GPUs, 2 IB devices, non-MIG nodeSelector,
#     affinity, KV sizing) is identical.
#
# CLUSTER REQUIREMENT — MUST RUN ON NON-MIG GPU NODES.
# Same rationale as the TP=2 manifest: requesting `nvidia.com/gpu: 2` on a MIG
# node yields 2 slices, not 2 full GPUs, and NVIDIA hardware blocks NVML
# topology / NCCL / NVLink across slices, which vLLM trips on at startup.

---
apiVersion: batch/v1
kind: Job
metadata:
  name: ${JOB_NAME}
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: mx-p2p-worker
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: worker-registry
      # Pin to a non-MIG GPU pool (mig.config=all-disabled, full physical
      # GPUs per node), required for TP=2 NCCL / NVLink / NVML to work —
      # MIG-sliced nodes expose slices, not GPUs, and hardware blocks
      # NCCL/NVLink/NVML across slices. The agentpool podAffinity below
      # becomes redundant under this nodeSelector but is kept for self-
      # documentation + as defense if this nodeSelector is removed.
      nodeSelector:
        agentpool: a100b
      affinity:
        # podAntiAffinity on hostname: keep source and target on different
        # physical hosts so RDMA still exercises true cross-host IB.
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: mx-p2p-worker
              topologyKey: kubernetes.io/hostname
        # podAffinity on agentpool: keep source and target in the SAME node
        # pool. The Azure AKS test cluster splits GPU nodes across multiple
        # InfiniBand partitions, and pods on different pkeys can't talk RDMA
        # to each other. Combined with hostname anti-affinity, forces
        # source/target onto different hosts WITHIN the same IB partition.
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: mx-p2p-worker
              topologyKey: agentpool
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: no-datadog
          operator: Exists
          effect: NoExecute
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 64Gi
      containers:
        - name: ${JOB_NAME}
          image: ${WORKER_IMAGE}
          imagePullPolicy: Always
          command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - --model
            - "${MX_CI_MODEL}"
            - --load-format
            - modelexpress
            - --tensor-parallel-size
            - "2"
            # Distribute MoE experts expert-parallel across the TP=2 ranks.
            # Sets parallel_config.expert_parallel_size > 0, which flows into
            # the ModelExpress source identity (mx_source_id) hash.
            - --enable-expert-parallel
            # Keep KV fixed and small so VRAM parity stays sensitive to
            # weight residency instead of vLLM auto-sizing cache around leaks.
            - --max-model-len
            - "1024"
            - --kv-cache-memory-bytes
            - "1073741824"
            - --trust-remote-code
            - --port
            - "${WORKER_PORT}"
          env:
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
            - name: VLLM_PLUGINS
              value: "modelexpress"
            - name: MX_SERVER_ADDRESS
              value: "mx-server:8000"
            - name: MX_CONTIGUOUS_REG
              value: "0"
            - name: MX_RDMA_NIC_PIN
              value: "auto"
            - name: UCX_RNDV_SCHEME
              value: "get_zcopy"
            - name: UCX_RNDV_THRESH
              value: "0"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: HF_TOKEN
          ports:
            - containerPort: ${WORKER_PORT}
          resources:
            requests:
              cpu: "8"
              memory: "32Gi"
              nvidia.com/gpu: "2"
              rdma/ib: "2"
            limits:
              nvidia.com/gpu: "2"
              rdma/ib: "2"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
          securityContext:
            capabilities:
              add: [IPC_LOCK]
