# Fleet rolling-update manifest for row 21 (5 workers, CRD + P2P metadata).
# Driven by run-mx-fleet-test, which applies this at replicas=1 then
# scales the Deployment directly from 1 → 5.
#
# Design choices:
#
#   No Dynamo — raw Deployment + Service; no operator dependency.
#   The first replica to start finds no READY source and loads from HF;
#   subsequent replicas discover it via mx-server and pull via NIXL.
#
#   No anti-affinity — the five workers may share a100a hosts because the
#   test exercises source lifecycle and pairing, not cross-node placement.
#
#   NIXL over TCP — MIG slices GPU but not RDMA. Each a100a node has one
#   IB NIC, so requesting rdma/ib: 1 per pod caps schedulable replicas to
#   the number of physical nodes. By using TCP
#   (NIXL_UCX_TLS=tcp,cuda_copy) we avoid requesting the rdma/ib device and
#   let the scheduler pack MIG-slice pods. The "RDMA transfer
#   complete" log marker still fires — it is a code-level name, not a
#   physical RDMA indicator.
#
#   No rdma/ib resource — TCP needs no IB device.
#   MX_RDMA_NIC_PIN and UCX_RNDV_SCHEME/THRESH dropped; they are IB-only.
#
# Environment variables substituted by envsubst before apply:
#   WORKER_IMAGE  — image built from ci/k8s/client/vllm/Dockerfile
#   MX_CI_MODEL   — HuggingFace model id

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mx-fleet-workers
  labels:
    app: mx-fleet-worker
spec:
  replicas: 1
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: mx-fleet-worker
  template:
    metadata:
      labels:
        app: mx-fleet-worker
    spec:
      imagePullSecrets:
        - name: worker-registry
      nodeSelector:
        agentpool: a100a
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: no-datadog
          operator: Exists
          effect: NoExecute
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 64Gi
      containers:
        - name: worker
          image: ${WORKER_IMAGE}
          imagePullPolicy: Always
          command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - --model
            - "${MX_CI_MODEL}"
            - --load-format
            - modelexpress
            - --tensor-parallel-size
            - "1"
            - --max-model-len
            - "1024"
            - --kv-cache-memory-bytes
            - "1073741824"
            - --trust-remote-code
            - --port
            - "8000"
          env:
            - name: VLLM_PLUGINS
              value: "modelexpress"
            - name: MX_SERVER_ADDRESS
              value: "mx-server:8000"
            - name: MX_CONTIGUOUS_REG
              value: "0"
            # Force NIXL's UCX context to TCP + CUDA memory staging. Plain
            # "tcp" alone causes UCX to treat GPU tensors as host memory
            # (warning: "memory is detected as host, check that UCX is
            # configured with CUDA support"), silently falling back to HF
            # disk load. The "cuda_copy" component enables UCX to stage
            # GPU memory through the CPU for TCP transport. nixl_transfer.py
            # reads NIXL_UCX_TLS and applies it only for the NIXL agent init.
            - name: NIXL_UCX_TLS
              value: "tcp,cuda_copy"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: HF_TOKEN
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
            limits:
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
          securityContext:
            capabilities:
              add: [IPC_LOCK]
---
apiVersion: v1
kind: Service
metadata:
  name: mx-fleet-workers
spec:
  selector:
    app: mx-fleet-worker
  ports:
    - port: 8000
      targetPort: 8000
