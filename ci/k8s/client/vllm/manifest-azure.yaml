# Azure GB200 single-job template for P2P RDMA weight-transfer CI tests.
#
# Applied twice by the workflow — once for the source, once for the target —
# with different env var substitutions each time:
#
#   Source apply:  JOB_NAME=mx-source  WORKER_PORT=<source_port>
#   Target apply:  JOB_NAME=mx-target  WORKER_PORT=<worker_port>
#
# The workflow (via run-mx-test) gates target apply on the ModelMetadata CR
# appearing in the namespace, replacing the need for an initContainer.
#
# Azure-specific differences vs manifest-gcp.yaml:
#   - No GKE multi-network annotations (not supported on AKS)
#   - rdma/ib resource limit exposes InfiniBand RDMA device (A100 SXM4 nodes)
#   - MX_RDMA_NIC_PIN=auto for per-rank IB NIC pinning (workaround for ucx#11259)
#   - nvidia.com/gpu + no-datadog tolerations for AKS A100 node pools (amd64)
#
# Environment variables substituted by envsubst before each apply:
#   JOB_NAME      — mx-source or mx-target
#   WORKER_IMAGE  — image built from ci/k8s/client/vllm/Dockerfile
#   WORKER_PORT   — port the vLLM server listens on
#   MX_CI_MODEL   — HuggingFace model id

---
apiVersion: batch/v1
kind: Job
metadata:
  name: ${JOB_NAME}
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: mx-p2p-worker
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: worker-registry
      # Pin to a specific GPU node pool rather than leaving the agentpool
      # open. Other pools in the cluster may have too few active nodes for
      # source + target anti-affinity to find a peer host, leaving target
      # Pending forever. The agentpool podAffinity below becomes redundant
      # (both pods already constrained here) but is kept for self-
      # documentation + as defense if this nodeSelector is removed.
      nodeSelector:
        agentpool: a100a
      affinity:
        # podAntiAffinity on hostname: keep source and target on different
        # physical hosts so RDMA still exercises true cross-host IB, not
        # intra-node loopback.
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: mx-p2p-worker
              topologyKey: kubernetes.io/hostname
        # podAffinity on agentpool: keep source and target in the SAME node
        # pool. The test cluster splits GPU nodes across multiple
        # InfiniBand partitions — pools have different pkeys, and pods on
        # different pkeys can't talk RDMA to each other (UCX error:
        # "local pkey 0xXXXX differs from remote pkey 0xYYYY",
        # NIXL_ERR_BACKEND on the receive). Combined with hostname anti-
        # affinity, this forces source/target onto different hosts WITHIN
        # the same IB partition.
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: mx-p2p-worker
              topologyKey: agentpool
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: no-datadog
          operator: Exists
          effect: NoExecute
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 64Gi
      containers:
        - name: ${JOB_NAME}
          image: ${WORKER_IMAGE}
          # Force re-pull on every pod creation so CI/dev iterations on the same
          # tag pick up freshly pushed images instead of the node's cached copy.
          imagePullPolicy: Always
          command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - --model
            - "${MX_CI_MODEL}"
            - --load-format
            - modelexpress
            - --tensor-parallel-size
            - "1"
            # Keep KV fixed and small so VRAM parity stays sensitive to
            # weight residency instead of vLLM auto-sizing cache around leaks.
            - --max-model-len
            - "1024"
            - --kv-cache-memory-bytes
            - "1073741824"
            - --trust-remote-code
            - --port
            - "${WORKER_PORT}"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: VLLM_PLUGINS
              value: "modelexpress"
            - name: MX_SERVER_ADDRESS
              value: "mx-server:8000"
            - name: MX_CONTIGUOUS_REG
              value: "0"
            - name: MX_RDMA_NIC_PIN
              value: "auto"
            # Substituted per-apply; both consuming actions default it to "1"
            # (tensor manifest served on-demand: the source stands up a
            # WorkerGrpcServer and serves the manifest on request), so an unset
            # value == current behavior. The full-tensor-manifest jobs override
            # to "0", where the source instead embeds the full tensor manifest
            # in the WorkerMetadata proto it publishes.
            - name: MX_P2P_METADATA
              value: "${MX_P2P_METADATA}"
            - name: MX_ARTIFACT_TRANSFER
              value: "1"
            - name: MX_ARTIFACT_READY_URL
              value: "http://127.0.0.1:${WORKER_PORT}/health"
            - name: UCX_RNDV_SCHEME
              value: "get_zcopy"
            - name: UCX_RNDV_THRESH
              value: "0"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: HF_TOKEN
          ports:
            - containerPort: ${WORKER_PORT}
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
              rdma/ib: "1"
            limits:
              nvidia.com/gpu: "1"
              rdma/ib: "1"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
          securityContext:
            capabilities:
              add: [IPC_LOCK]
