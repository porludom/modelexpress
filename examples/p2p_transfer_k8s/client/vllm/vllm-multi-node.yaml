# Multi-node vLLM StatefulSet with ModelExpress P2P weight transfer.
#
# Deploys deepseek-ai/DeepSeek-V4-Pro as a single StatefulSet across 2 nodes (8 GPUs total):
#   - tensor-parallel-size=4 (within each node)
#   - pipeline-parallel-size=2 (across nodes)
#
# Pod roles are determined by ordinal index:
#   - pod-0: vLLM API server + multiprocessing head
#   - pod-1: headless vLLM multiprocessing worker
#
# The headless Service gives each pod a stable DNS name so pod-1 reliably
# connects to pod-0 regardless of scheduling. Scaling to 2 StatefulSet
# instances (different names) supports P2P transfer testing.
#
# Prerequisites:
#   - ModelExpress server deployed (see ../../server/)
#   - PVC "model-cache" with model weights (or enough space for HF download)
#   - kubectl create secret generic hf-token-secret --from-literal=HF_TOKEN=<token>
#
# Usage (single instance):
#   kubectl apply -f vllm-multi-node.yaml -n <namespace>
#
# Usage (two P2P instances):
#   kubectl apply -f vllm-multi-node.yaml -n <namespace>
#   # Rename StatefulSet to mx-vllm-target and apply again for second instance

# Headless Service: gives each pod stable DNS (pod-N.mx-vllm.<ns>.svc.cluster.local)
apiVersion: v1
kind: Service
metadata:
  name: mx-vllm
  labels:
    app: mx-vllm
spec:
  clusterIP: None
  # Make pod-0 DNS resolvable while both pods join the vLLM process group.
  publishNotReadyAddresses: true
  selector:
    app: mx-vllm
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
# StatefulSet: 2 pods per instance (pod-0 = API/head, pod-1 = headless worker)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mx-vllm
  labels:
    app: mx-vllm
spec:
  serviceName: mx-vllm
  podManagementPolicy: Parallel
  replicas: 2
  selector:
    matchLabels:
      app: mx-vllm
  template:
    metadata:
      labels:
        app: mx-vllm
    spec:
      # Spread the multiprocessing workers across different nodes.
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: mx-vllm
              topologyKey: kubernetes.io/hostname
      containers:
        - name: vllm
          # Build a vLLM + ModelExpress client image using
          # examples/p2p_transfer_k8s/client/vllm/Dockerfile
          image: <your-registry>/modelexpress-client:latest
          imagePullPolicy: IfNotPresent
          # IPC_LOCK required for RDMA memory pinning (NIXL/UCX GPUDirect)
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: VLLM_RPC_TIMEOUT
              value: "7200000"
            - name: HF_HOME
              value: "/models"
            - name: MODEL_NAME
              value: "deepseek-ai/DeepSeek-V4-Pro"
            - name: MX_SERVER_ADDRESS
              value: "modelexpress-server:8001"
            # Transfer compatible vLLM JIT caches after the source is healthy.
            - name: MX_ARTIFACT_TRANSFER
              value: "1"
            # Per-rank IB NIC pinning. Workaround for openucx/ucx#11259.
            - name: MX_RDMA_NIC_PIN
              value: "auto"
            - name: NIXL_LOG_LEVEL
              value: "INFO"
            - name: UCX_LOG_LEVEL
              value: "INFO"
            - name: UCX_RNDV_SCHEME
              value: "get_zcopy"
            - name: UCX_RNDV_THRESH
              value: "0"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: HF_TOKEN
          command: ["/bin/bash", "-c"]
          args:
            - |
              ORDINAL=${HOSTNAME##*-}
              STS_NAME=${HOSTNAME%-*}
              MASTER_ADDR=${STS_NAME}-0.${STS_NAME}

              HEADLESS=""
              if [ "$ORDINAL" != "0" ]; then
                HEADLESS="--headless"
              fi

              exec vllm serve "$MODEL_NAME" \
                --load-format modelexpress \
                --tensor-parallel-size 4 \
                --pipeline-parallel-size 2 \
                --nnodes 2 \
                --node-rank "$ORDINAL" \
                --master-addr "$MASTER_ADDR" \
                --max-model-len 32768 \
                --kv-cache-dtype fp8 \
                $HEADLESS
          resources:
            limits:
              nvidia.com/gpu: "4"
              rdma/ib: "4"
            requests:
              nvidia.com/gpu: "4"
              rdma/ib: "4"
              memory: "300Gi"
              cpu: "16"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: model-cache
              mountPath: /models
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 179Gi
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache
      imagePullSecrets:
        - name: nvcr-imagepullsecret
