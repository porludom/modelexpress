# RBAC for the Kubernetes metadata backend.
# Required when MX_METADATA_BACKEND=kubernetes so the server can manage
# ModelMetadata CRDs and tensor descriptor ConfigMaps in its namespace.
{{- if and .Values.serviceAccount.create .Values.serviceAccount.rbac.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "modelexpress.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "modelexpress.labels" . | nindent 4 }}
rules:
  # P2P metadata (MX_METADATA_BACKEND=kubernetes)
  - apiGroups: ["modelexpress.nvidia.com"]
    resources: ["modelmetadatas", "modelmetadatas/status"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Model registry (MX_METADATA_BACKEND=kubernetes)
  - apiGroups: ["modelexpress.nvidia.com"]
    resources: ["modelcacheentries", "modelcacheentries/status"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "modelexpress.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "modelexpress.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "modelexpress.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "modelexpress.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
